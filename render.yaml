services:
  - type: web
    name: shopping-list-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: shopping-list-db
          property: connectionString

databases:
  - name: shopping-list-db
    plan: free
